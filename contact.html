<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact - MindPath</title>
    
<style>

body {
    font-family: Arial, Verdana, sans-serif;
    color: #b088ad;
    font-size: 20px;
    background-color: #efef55;
}
form {
    width: 500px;
    margin: 20px auto;
    color: #bd93ba;
    
}

label {
    display: block;
    font-size: 14px;
    margin: 12px 0 5px 0;
    font-weight: bold;
    color: #bd93ba;
}

input[type="text"],
input[type="email"],
select,
textarea {
    width: 100%;
    padding: 8px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    font-family: Arial, Verdana, sans-serif;
    font-size: 14px;
    box-sizing: border-box;
    color: #bd93ba;
}

textarea {
    height: 120px;
    resize: vertical;
    color: #bd93ba;
}

input[type="submit"] {
    background-color: #0066cc;
    color: white;
    padding: 10px 30px;
    border: none;
    font-size: 16px;  
    color: #bd93ba;
}
</style>


</head>
<body>
    
        <h1>Contact Us</h1>
        
        <p>If you have any questions or would like to get in touch, please fill out the form below.</p>
        
        <form method="POST" action="#">
            <label for="name">Your Name:</label>
            <input type="text" id="name" name="name" required>
            
            <label for="email">Your Email:</label>
            <input type="email" id="email" name="email" required>
            
            <label for="subject">Subject:</label>
            <select id="subject" name="subject" required>
                <option value="">-- Please Select --</option>
                <option value="feedback">Feedback</option>
                <option value="question">Question</option>
                <option value="support">Need Support</option>
                <option value="other">Other</option>
            </select>
            
            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>
            
            <input type="submit" value="Send Message">
        </form>
        
        <h2>Need Urgent Help?</h2>
        <p>If you need urgent support, please contact one of the helplines on our Helplines page.</p>
        <p><strong>Emergency:</strong> Call 999 if you are in immediate danger.</p>
   
</body>
</html>
