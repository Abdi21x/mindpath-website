<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact - MindPath</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Contact Us</h1>
        
        <p>If you have any questions or would like to get in touch, please fill out the form below.</p>
        
        <form method="POST" action="#">
            <label for="name">Your Name:</label>
            <input type="text" id="name" name="name" required>
            
            <label for="email">Your Email:</label>
            <input type="email" id="email" name="email" required>
            
            <label for="subject">Subject:</label>
            <select id="subject" name="subject" required>
                <option value="">-- Please Select --</option>
                <option value="feedback">Feedback</option>
                <option value="question">Question</option>
                <option value="support">Need Support</option>
                <option value="other">Other</option>
            </select>
            
            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>
            
            <input type="submit" value="Send Message">
        </form>
        
        <h2>Need Urgent Help?</h2>
        <p>If you need urgent support, please contact one of the helplines on our Helplines page.</p>
        <p><strong>Emergency:</strong> Call 999 if you are in immediate danger.</p>
    </div>
</body>
</html>
